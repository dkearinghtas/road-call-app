name: Azure Next.js App deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Database Migrations
        run: |
          # Get the public IP of the runner
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Whitelisting runner IP: $RUNNER_IP"
          
          # Add firewall rule
          az sql server firewall-rule create \
            --resource-group InvoiceViewer-rg \
            --server road-call-server-dkearinghtas \
            --name GHA-Migration-${{ github.run_id }} \
            --start-ip-address $RUNNER_IP \
            --end-ip-address $RUNNER_IP
          
          # Run migration
          npx prisma migrate deploy
          
          # Remove firewall rule
          az sql server firewall-rule delete \
            --resource-group InvoiceViewer-rg \
            --server road-call-server-dkearinghtas \
            --name GHA-Migration-${{ github.run_id }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'road-call-app-azdeploy' # Placeholder
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
